{% extends "base.html" %}

{% block title %}Sign in — IGCSE Recap{% endblock %}

{% block body %}
  <div class="auth-shell">
    <form method="post" class="auth-card">
      <h1>Sign in</h1>
      <p class="auth-subtitle">No self-signup — ask your teacher for credentials.</p>

      <label class="auth-field">
        Email or username
        <input type="text" name="email" autocomplete="username" autofocus required>
      </label>

      <label class="auth-field">
        Password
        <input type="password" name="password" autocomplete="current-password" required>
      </label>

      <button type="submit" class="auth-submit">Sign in</button>
    </form>
  </div>
{% endblock %}
