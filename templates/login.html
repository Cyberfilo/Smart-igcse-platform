{% extends "base.html" %}

{% block title %}Sign in{% endblock %}

{% block body %}
  <main class="container">
    <header class="page-header">
      <h1>Sign in</h1>
      <p class="subtitle">No self-signup — ask your teacher for credentials.</p>
    </header>

    <form method="post" class="strategy-box" style="max-width: 420px; margin: 0 auto;">
      <label class="section-h" for="email">Email</label>
      <input type="email" id="email" name="email" required style="width:100%; padding:.6rem; margin-bottom:1rem;">

      <label class="section-h" for="password">Password</label>
      <input type="password" id="password" name="password" required style="width:100%; padding:.6rem; margin-bottom:1rem;">

      <button type="submit" class="nav-btn active" style="width:100%;">Sign in</button>
    </form>
  </main>
{% endblock %}
